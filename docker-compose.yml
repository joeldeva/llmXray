services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llmxray
      POSTGRES_USER: llmxray
      POSTGRES_PASSWORD: llmxray_dev_password
    volumes:
      - llmxray-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmxray -d llmxray"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3001
      DATABASE_URL: postgres://llmxray:llmxray_dev_password@postgres:5432/llmxray
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      JWT_SECRET: replace-this-before-production
      LLMXRAY_MASTER_API_KEY: replace-this-before-production
      LLMXRAY_TENANT_ID: local-dev
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  llmxray-postgres:
